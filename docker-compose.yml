# FocusBarber — Docker Compose de desenvolvimento.
# PRD §13.4.5: healthchecks obrigatórios (Django /health/, PostgreSQL pg_isready).
# PRD §13.4.4: ordem de inicialização segura (web depende de db saudável).
#
# Redis + RabbitMQ + Celery entram em sprints posteriores — Sprint 1 não
# overingeiere (PRD §27: risco "Overengineering inicial").

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-focusbarber}
      POSTGRES_USER: ${POSTGRES_USER:-focusbarber}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-focusbarber}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-focusbarber} -d ${POSTGRES_DB:-focusbarber}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    environment:
      # Sobrepõe o host do banco para o nome do serviço dentro do compose.
      DB_HOST: db
      DATABASE_URL: postgres://${POSTGRES_USER:-focusbarber}:${POSTGRES_PASSWORD:-focusbarber}@db:5432/${POSTGRES_DB:-focusbarber}
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health/',timeout=3).status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  postgres_data: